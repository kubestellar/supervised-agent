# hive-project.yaml — KubeStellar Console (reference implementation)
#
# This is the production config for the kubestellar/console hive deployment.
# Copy to /etc/hive/hive-project.yaml on the hive server.

project:
  name: "KubeStellar Console"
  org: "kubestellar"
  primary_repo: "kubestellar/console"
  repos:
    - kubestellar/console
    - kubestellar/console-kb
    - kubestellar/docs
    - kubestellar/console-marketplace
    - kubestellar/kubestellar-mcp
  ai_author: "clubanderson"
  website: "console.kubestellar.io"
  hive_repo: "kubestellar/hive"

agents:
  enabled:
    - supervisor
    - scanner
    - reviewer
    - architect
    - outreach
  beads_base: "/home/dev"
  workdir: "/home/dev/kubestellar-console"
  policy_dir: "examples/kubestellar/agents"

health_checks:
  workflows:
    - name: "Nightly Test Suite"
      key: nightly
      type: nightly
    - name: "Nightly Compliance & Perf"
      key: nightlyCompliance
      type: nightly
    - name: "Nightly Dashboard Health"
      key: nightlyDashboard
      type: nightly
    - name: "Nightly gh-aw Version Check"
      key: nightlyGhaw
      type: nightly
    - name: "Playwright Cross-Browser (Nightly)"
      key: nightlyPlaywright
      type: nightly
  ci_workflow: "Build and Deploy KC"
  deploy_jobs:
    - name: "deploy-vllm-d"
    - name: "deploy-pok-prod"
  perf_workflows:
    - "Perf — React commits per navigation"
    - "Performance TTFI Gate"
  brew:
    tap_repo: "kubestellar/homebrew-tap"
    formula: "kubestellar-console.rb"
  helm:
    chart_path: "deploy/helm/kubestellar-console/Chart.yaml"
  release_workflow: "Release"

outreach:
  enabled: true
  description: "KubeStellar Console — Multi-cluster Kubernetes dashboard with AI-powered operations"
  differentiators:
    - "CNCF Sandbox project"
    - "20+ CNCF project integrations"
    - "AI-powered cluster management"
    - "SBOM and SLSA supply chain security"
  target_placements: 200
  coverage_badge_url: "https://gist.githubusercontent.com/clubanderson/b9a9ae8469f1897a22d5a40629bc1e82/raw/coverage-badge.json"
  ga4:
    property_id: "525401563"
    service_account_key: "/home/dev/.config/gcloud-keys/ga4-reader-key.json"

classification:
  # Deterministic rules for issue classification — agents read results, not rules.
  # Other projects: add your own patterns here.
  complexity:
    simple:
      labels: ["auto-qa", "auto-qa-coverage", "auto-qa-i18n", "auto-qa-const"]
      title_patterns:
        - '\b(i18n|const|label|typo|rename|spelling|missing\s+translation|hardcoded\s+string)\b'
      model: "haiku"
    complex:
      labels: ["architecture", "epic", "rfc", "redesign"]
      title_patterns:
        - '\b(refactor|redesign|migrat|api\s+change|breaking\s+change|rearchitect)\b'
      model: "opus"
    default_model: "sonnet"
  tracker_prefixes: ["[Auto-QA]", "[Nightly]", "Nightly Test Suite"]
  lanes:
    architect:
      labels: ["architecture", "epic", "rfc", "redesign"]
      title_patterns:
        - '\b(refactor|redesign|migrat|api\s+change|breaking\s+change|rearchitect)\b'
    outreach:
      labels: ["outreach", "cncf", "awesome-list", "external-submission", "adopters"]
      title_patterns:
        - '\b(awesome[- ]list|outreach|adopter|CNCF|landscape|external\s+submission)\b'
    # default lane is "scanner" — everything not matched above
  architecture_signals:
    title_patterns:
      - '\b(refactor|redesign|migrat|api\s+change|breaking\s+change|rearchitect)\b'
    labels: ["architecture", "epic", "rfc", "redesign"]
    min_directories: 4
  clustering:
    reporter_window_seconds: 1800
    failure_modes:
      i18n: '\b(i18n|translation|locali[sz]|t\(\)|intl)\b'
      null-check: '\b(null|undefined|cannot read|TypeError|NoneType)\b'
      css-visual: '\b(overflow|truncat|align|margin|padding|z-index|opacity|visible|hidden)\b'
      test-flake: '\b(flaky|intermittent|timeout|race condition|retry)\b'
  copilot_check:
    bot_name: "copilot-swe-agent[bot]"
    lookback_days: 1
    severity_keywords:
      high: ["security", "vulnerability", "injection", "xss", "sql", "auth", "credential", "secret"]
      medium: ["null", "undefined", "error", "exception", "crash", "race", "deadlock", "memory", "leak"]
      low: ["style", "naming", "format", "whitespace", "comment", "typo", "nit", "minor"]

# Pipeline: deterministic scripts that run before agent kicks.
# Categories:
#   enumerator — fetch and filter the canonical work list
#   classifier — enrich items with deterministic metadata
#   gate        — pre-check merge/action eligibility
#   monitor     — detect state in external systems (GA4, Copilot, outreach PRs)
#   enforcer    — block agents from forbidden operations (always-on, not per-kick)
#
# Each stage declares:
#   script:    path relative to bin/
#   output:    path to JSON output file
#   consumers: which agents read this output (or "all")
#   phase:     pre-kick | post-kick | always-on
#   depends:   stages that must complete first (by name)
pipeline:
  stages:
    # --- Phase 1: Enumerate (must run first) ---
    - name: enumerator
      category: enumerator
      script: enumerate-actionable.sh
      output: /var/run/hive-metrics/actionable.json
      consumers: all
      phase: pre-kick
      depends: []

    # --- Phase 2: Classify + Gate (depend on enumerator) ---
    - name: classifier
      category: classifier
      script: issue-classifier.sh
      output: /var/run/hive-metrics/actionable.json  # enriches in-place
      consumers: [scanner, architect]
      phase: pre-kick
      depends: [enumerator]

    - name: cluster-detector
      category: classifier
      script: pr-cluster-detector.sh
      output: /var/run/hive-metrics/actionable.json  # enriches in-place
      consumers: [scanner]
      phase: pre-kick
      depends: [classifier]

    - name: architecture-detector
      category: classifier
      script: architecture-detector.sh
      output: /var/run/hive-metrics/actionable.json  # enriches in-place
      consumers: [scanner, architect]
      phase: pre-kick
      depends: [classifier]

    - name: merge-gate
      category: gate
      script: merge-gate.sh
      output: /var/run/hive-metrics/merge-eligible.json
      consumers: [scanner]
      phase: pre-kick
      depends: [enumerator]

    # --- Phase 3: Monitors (can run in parallel, depend on enumerator) ---
    - name: copilot-comments
      category: monitor
      script: copilot-comment-checker.sh
      output: /var/run/hive-metrics/copilot-comments.json
      consumers: [reviewer]
      phase: pre-kick
      depends: [enumerator]

    - name: outreach-tracker
      category: monitor
      script: outreach-tracker.sh
      output: /var/run/hive-metrics/outreach-prs.json
      consumers: [outreach]
      phase: pre-kick
      depends: [enumerator]

    - name: ga4-anomalies
      category: monitor
      script: ga4-anomaly-detector.sh
      output: /var/run/hive-metrics/ga4-anomalies.json
      consumers: [reviewer]
      phase: pre-kick
      depends: []

    # --- Always-on: Enforcers ---
    - name: gh-wrapper
      category: enforcer
      script: null  # installed at /usr/local/bin/gh, not run per-kick
      output: null
      consumers: all
      phase: always-on
      depends: []

governor:
  exempt_labels:
    - nightly-tests
    - LFX
    - do-not-merge
    - meta-tracker
    - hold
    - adopters
    - changes-requested
    - waiting-on-author

dashboard:
  title: "KubeStellar Console Hive"
  port: 3001
