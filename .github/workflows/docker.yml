name: Build and Push Docker Image

on:
  push:
    branches:
      - v2

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract git metadata
        id: meta
        run: |
          echo "git_hash=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "git_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: v2/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kubestellar/hive:latest
            ghcr.io/kubestellar/hive:${{ steps.meta.outputs.git_short }}
          build-args: |
            GIT_HASH=${{ steps.meta.outputs.git_hash }}
            GIT_SHORT=${{ steps.meta.outputs.git_short }}
