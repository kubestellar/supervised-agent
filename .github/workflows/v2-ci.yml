name: v2 CI

on:
  push:
    branches: [v2]
    paths: ['v2/**']
  pull_request:
    branches: [v2]
    paths: ['v2/**']

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: v2/go.sum

      - name: Build
        run: go build ./cmd/hive/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./pkg/... -short -race -coverprofile=coverage.out -count=1

      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 91.0" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 91% threshold"
            exit 1
          fi

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f v2/Dockerfile -t hive:test .

      - name: Smoke test
        run: docker run --rm hive:test --help || true

  nightly-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/v2'
    runs-on: ubuntu-latest
    needs: [build-and-test, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: v2/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/hive:nightly
            ghcr.io/${{ github.repository }}/hive:nightly-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_SHORT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
