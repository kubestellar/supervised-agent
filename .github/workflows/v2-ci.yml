name: v2 CI

on:
  push:
    branches: [v2]
    paths: ['v2/**']
  pull_request:
    branches: [v2]
    paths: ['v2/**']

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: v2/go.sum

      - name: Build
        run: go build ./cmd/hive/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./pkg/... -short -race -count=1

  create-issue-on-failure:
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/v2'
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create issue for test failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            const title = `[CI] v2 test failure on ${sha}`;

            // Avoid duplicates: check for an open issue with the same title prefix
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 10,
            });
            const dup = existing.data.find(i => i.title.startsWith('[CI] v2 test failure'));
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `Another failure on \`${sha}\`: ${runUrl}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## CI Failure\n\n- **Commit:** \`${context.sha}\`\n- **Run:** ${runUrl}\n- **Branch:** v2\n\nTests or coverage check failed on push. See the [workflow run](${runUrl}) for details.`,
              labels: ['ci-failure', 'kind/bug'],
            });

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f v2/Dockerfile -t hive:test .

      - name: Smoke test
        run: docker run --rm hive:test --help || true

  nightly-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/v2'
    runs-on: ubuntu-latest
    needs: [build-and-test, docker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: v2/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/hive:nightly
            ghcr.io/${{ github.repository }}/hive:nightly-${{ github.sha }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_SHORT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
