apiVersion: v1
kind: Secret
metadata:
  name: hive-secrets
  namespace: hive
  labels:
    app.kubernetes.io/name: hive
type: Opaque
stringData:
  # GitHub App authentication (preferred)
  # gh-app-key.pem: |
  #   -----BEGIN RSA PRIVATE KEY-----
  #   ...
  #   -----END RSA PRIVATE KEY-----

  # OR: GitHub PAT (simpler, less secure)
  # HIVE_GITHUB_TOKEN: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

  # Dashboard auth token (for mutation endpoints via proxy)
  # HIVE_DASHBOARD_TOKEN: your-dashboard-token-here
