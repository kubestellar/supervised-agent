# Hive v2 — full agent deployment
# All agents configured; pause/unpause via dashboard.
# Runs inside Docker on a Proxmox LXC.

project:
  org: kubestellar
  name: KubeStellar
  repos:
    - console
    - docs
    - console-kb
    - kubestellar-mcp
    - console-marketplace
    - homebrew-tap
  ai_author: clubanderson
  primary_repo: console

policies:
  repo: https://github.com/kubestellar/hive
  path: examples/kubestellar/agents/
  local_dir: /data/policies
  poll_interval: 5m

agents:
  scanner:
    enabled: true
    backend: copilot
    model: claude-opus-4.6
    beads_dir: /data/beads/scanner
    clear_on_kick: true
    cli_pinned: true
    stale_timeout: 1800
    restart_strategy: immediate
    launch_cmd: "/usr/bin/copilot --allow-all --model claude-opus-4.6"
    display_name: scanner
  ci-maintainer:
    enabled: true
    backend: copilot
    model: claude-opus-4.6
    beads_dir: /data/beads/ci-maintainer
    clear_on_kick: true
    cli_pinned: true
    stale_timeout: 2400
    restart_strategy: immediate
    launch_cmd: "/usr/bin/copilot --allow-all --model claude-opus-4.6"
  architect:
    enabled: true
    backend: copilot
    model: claude-opus-4.6
    beads_dir: /data/beads/architect
    clear_on_kick: true
    cli_pinned: true
    stale_timeout: 9000
    restart_strategy: immediate
    launch_cmd: "/usr/bin/copilot --allow-all --model claude-opus-4.6"
  supervisor:
    enabled: true
    backend: copilot
    model: claude-sonnet-4-6
    beads_dir: /data/beads/supervisor
    clear_on_kick: true
    cli_pinned: true
    stale_timeout: 3600
    restart_strategy: immediate
    launch_cmd: "agent-launch.sh --backend copilot --model claude-sonnet-4-6"
  outreach:
    enabled: true
    backend: copilot
    model: claude-opus-4.6
    beads_dir: /data/beads/outreach
    clear_on_kick: true
    cli_pinned: true
    stale_timeout: 7200
    restart_strategy: immediate
    launch_cmd: "/usr/bin/copilot --allow-all --model claude-opus-4.6"
  sec-check:
    enabled: true
    backend: copilot
    model: claude-opus-4.6
    beads_dir: /data/beads/sec-check
    clear_on_kick: true
    cli_pinned: true
    stale_timeout: 1800
    restart_strategy: immediate
    launch_cmd: "/usr/bin/copilot --allow-all --model claude-opus-4.6"
    display_name: sec-check
  tester:
    enabled: true
    backend: copilot
    model: claude-sonnet-4-6
    beads_dir: /data/beads/tester
    clear_on_kick: true
    cli_pinned: true
    stale_timeout: 2400
    restart_strategy: immediate
    launch_cmd: "agent-launch.sh --backend copilot --model claude-sonnet-4-6"
    display_name: Tester
  strategist:
    enabled: true
    backend: copilot
    model: claude-sonnet-4-6
    beads_dir: /data/beads/strategist
    clear_on_kick: true
    stale_timeout: 3600
    restart_strategy: immediate
    launch_cmd: "agent-launch.sh --backend copilot --model claude-sonnet-4-6"
    display_name: Strategist

governor:
  eval_interval_s: 300
  modes:
    surge:
      threshold: 30
      supervisor: 5m
      scanner: 15m
      ci-maintainer: pause
      architect: pause
      outreach: pause
      sec-check: 2m
      tester: pause
      strategist: pause
    busy:
      threshold: 16
      supervisor: 5m
      scanner: 15m
      ci-maintainer: 1h
      architect: pause
      outreach: pause
      sec-check: 2m
      tester: 2h
      strategist: pause
    quiet:
      threshold: 5
      supervisor: 5m
      scanner: 15m
      ci-maintainer: 45m
      architect: pause
      outreach: pause
      sec-check: 2m
      tester: 45m
      strategist: pause
    idle:
      threshold: 0
      supervisor: 5m
      scanner: 15m
      ci-maintainer: 15m
      architect: 2h
      outreach: 2h
      sec-check: 2m
      tester: 30m
      strategist: pause
  labels:
    exempt:
      - nightly-tests
      - LFX
      - do-not-merge
      - meta-tracker
      - auto-qa-tuning-report
      - hold
      - adopters
      - changes-requested
      - waiting-on-author
  sensing:
    gh_rate_patterns:
      - "API rate limit exceeded"
      - "secondary rate limit"
      - "403.*rate limit"
      - "You have exceeded a secondary rate"
      - "retry-after:[[:space:]]*[0-9]"
      - "gh: Resource not accessible"
      - "abuse detection mechanism"
    cli_exclude_patterns:
      - "You.re out of extra usage"
      - "out of extra usage"
      - "extra usage.*resets"
      - "resets [0-9]+(:[0-9]+)?[aApP][mM]"
    ttl_seconds: 900
    pullback_seconds: 900
  health:
    healthcheck_interval: 300
    restart_cooldown: 60
    model_lock: false
  budget:
    total_tokens: 200000000
    period_days: 7
    critical_pct: 90

github:
  token: ${HIVE_GITHUB_TOKEN}

notifications:
  ntfy:
    server: ${NTFY_SERVER}
    topic: ${NTFY_TOPIC}

dashboard:
  port: 3001
  snapshot_dir: /data/snapshots
  auth_token: ${HIVE_DASHBOARD_TOKEN}

data:
  metrics_dir: /data/metrics
  logs_dir: /data/logs
  claude_sessions_dir: /root/.claude/projects
