services:
  hive:
    build:
      context: ..
      dockerfile: v2/Dockerfile
      args:
        GIT_HASH: ${GIT_HASH:-unknown}
        GIT_SHORT: ${GIT_SHORT:-unknown}
    container_name: hive
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "7681:7681"
    volumes:
      - ./hive.yaml:/etc/hive/hive.yaml:ro
      - hive-data:/data
      - ./secrets:/secrets:ro
    environment:
      - HIVE_GITHUB_TOKEN=${HIVE_GITHUB_TOKEN}
      - HIVE_DASHBOARD_TOKEN=${HIVE_DASHBOARD_TOKEN}
      - NTFY_SERVER=${NTFY_SERVER}
      - NTFY_TOPIC=${NTFY_TOPIC}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  hive-data:
