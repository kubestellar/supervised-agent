<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hive Dashboard</title>
<style>
  :root { --bg: #0a0a0a; --card: #1a1a1a; --border: #333; --text: #e0e0e0; --muted: #888; --accent: #f59e0b; --green: #22c55e; --red: #ef4444; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
  header { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  header h1 { font-size: 1.5rem; color: var(--accent); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); }
  .status-dot.disconnected { background: var(--red); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .card .label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card .value { font-size: 1.5rem; font-weight: 700; margin-top: 0.25rem; }
  .mode-SURGE { color: var(--red); }
  .mode-BUSY { color: #f97316; }
  .mode-QUIET { color: var(--accent); }
  .mode-IDLE { color: var(--green); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }
  .state { padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
  .state-running { background: rgba(34,197,94,0.15); color: var(--green); }
  .state-idle { background: rgba(107,114,128,0.15); color: var(--muted); }
  .state-failed { background: rgba(239,68,68,0.15); color: var(--red); }
  .state-stopped { background: rgba(107,114,128,0.15); color: var(--muted); }
  #log { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
  .timestamp { color: var(--muted); font-size: 0.75rem; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐝 Hive</h1>
    <div class="status-dot" id="statusDot"></div>
    <span class="timestamp" id="lastUpdate">Connecting...</span>
  </header>

  <div class="grid" id="cards">
    <div class="card"><div class="label">Governor Mode</div><div class="value" id="mode">—</div></div>
    <div class="card"><div class="label">Issues</div><div class="value" id="issues">—</div></div>
    <div class="card"><div class="label">Pull Requests</div><div class="value" id="prs">—</div></div>
    <div class="card"><div class="label">On Hold</div><div class="value" id="hold">—</div></div>
    <div class="card"><div class="label">SLA Violations</div><div class="value" id="sla">—</div></div>
  </div>

  <h2 style="margin-bottom: 0.75rem;">Agents</h2>
  <div class="card" style="margin-bottom: 1.5rem;">
    <table>
      <thead><tr><th>Name</th><th>State</th><th>Backend</th><th>Model</th><th>Last Kick</th></tr></thead>
      <tbody id="agentTable"></tbody>
    </table>
  </div>

  <h2 style="margin-bottom: 0.75rem;">Event Log</h2>
  <div id="log"></div>
</div>

<script>
const MAX_LOG_LINES = 200;

function connect() {
  const dot = document.getElementById('statusDot');
  const es = new EventSource('/api/events');

  es.onopen = () => { dot.classList.remove('disconnected'); };
  es.onerror = () => { dot.classList.add('disconnected'); };

  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      updateDashboard(data);
    } catch (err) {
      console.error('SSE parse error', err);
    }
  };
}

function updateDashboard(data) {
  document.getElementById('lastUpdate').textContent = new Date(data.timestamp).toLocaleTimeString();

  if (data.governor) {
    const modeEl = document.getElementById('mode');
    modeEl.textContent = data.governor.mode;
    modeEl.className = 'value mode-' + data.governor.mode;
    document.getElementById('issues').textContent = data.governor.queue_issues ?? '—';
    document.getElementById('prs').textContent = data.governor.queue_prs ?? '—';
  }

  if (data.actionable) {
    document.getElementById('hold').textContent = data.actionable.hold?.total ?? '—';
    document.getElementById('sla').textContent = data.actionable.issues?.sla_violations ?? '—';
  }

  if (data.agents) {
    const tbody = document.getElementById('agentTable');
    tbody.innerHTML = '';
    for (const [name, agent] of Object.entries(data.agents).sort((a, b) => a[0].localeCompare(b[0]))) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${name}</td>
        <td><span class="state state-${agent.state}">${agent.state}</span></td>
        <td>${agent.backend || '—'}</td>
        <td>${agent.model || '—'}</td>
        <td class="timestamp">${agent.last_kick ? new Date(agent.last_kick).toLocaleTimeString() : '—'}</td>
      `;
      tbody.appendChild(tr);
    }
  }

  appendLog(JSON.stringify({
    mode: data.governor?.mode,
    issues: data.governor?.queue_issues,
    prs: data.governor?.queue_prs,
    agents_due: data.governor?.agents_due,
  }));
}

function appendLog(text) {
  const log = document.getElementById('log');
  const ts = new Date().toLocaleTimeString();
  log.textContent += `[${ts}] ${text}\n`;
  const lines = log.textContent.split('\n');
  if (lines.length > MAX_LOG_LINES) {
    log.textContent = lines.slice(-MAX_LOG_LINES).join('\n');
  }
  log.scrollTop = log.scrollHeight;
}

connect();
</script>
</body>
</html>
